<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentHedge — Bienvenido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#070b1c;--surface:#0d1530;--surface2:#121d3e;--green:#00c896;--green2:#00e6ac;--gold:#f0c060;--text:#dce6f5;--muted:#7a90b8;--border:rgba(0,200,150,.13);--glow:rgba(0,200,150,.22)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative}

/* Background layers */
.bg-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,200,150,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,150,.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 20%,transparent 80%);z-index:0}
.bg-glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 50% 60%,rgba(0,200,150,.07) 0%,transparent 70%),radial-gradient(ellipse 40% 35% at 15% 25%,rgba(74,144,226,.05) 0%,transparent 65%);z-index:0}

/* Floating particles */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.p{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--green);opacity:0;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:.6}90%{opacity:.3}100%{transform:translateY(-10vh) translateX(40px);opacity:0}}

/* Main card */
.card{position:relative;z-index:1;text-align:center;padding:4rem 3rem 3.5rem;max-width:640px;width:90%;animation:cardIn .9s cubic-bezier(.22,1,.36,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Logo */
.logo-wrap{display:flex;align-items:center;justify-content:center;gap:.7rem;margin-bottom:2.8rem;animation:fadeUp .6s .1s both}
.logo-icon{width:48px;height:48px;animation:shieldPulse 3s ease-in-out infinite}
@keyframes shieldPulse{0%,100%{filter:drop-shadow(0 0 8px rgba(0,200,150,.3))}50%{filter:drop-shadow(0 0 20px rgba(0,200,150,.7))}}
.logo-name{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;background:linear-gradient(120deg,var(--green),#7fffdf);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Slogan */
.slogan{font-family:'Syne',sans-serif;font-size:clamp(1.7rem,5vw,2.6rem);font-weight:800;line-height:1.18;letter-spacing:-.02em;margin-bottom:1.2rem;animation:fadeUp .65s .2s both}
.slogan .line1{display:block;color:var(--text)}
.slogan .line2{display:block;background:linear-gradient(125deg,var(--green) 10%,#7fffdf 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Divider */
.sep{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);margin:1.6rem auto;animation:fadeUp .65s .3s both}

/* Sub text */
.sub{font-size:.97rem;color:var(--muted);font-weight:300;line-height:1.75;max-width:420px;margin:0 auto 2.8rem;animation:fadeUp .65s .35s both}

/* CTA Button */
.cta-wrap{animation:fadeUp .65s .45s both}
.cta{
  display:inline-flex;align-items:center;gap:.75rem;
  background:linear-gradient(135deg,var(--green),#00dba6);
  color:#06091a;border:none;padding:1rem 2.4rem;
  border-radius:50px;
  font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;
  cursor:pointer;text-decoration:none;
  transition:all .3s cubic-bezier(.22,1,.36,1);
  box-shadow:0 4px 24px rgba(0,200,150,.3),0 1px 0 rgba(255,255,255,.15) inset;
  position:relative;overflow:hidden;
}
.cta::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);opacity:0;transition:opacity .3s}
.cta:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 12px 40px rgba(0,200,150,.45)}
.cta:hover::before{opacity:1}
.cta:active{transform:translateY(-1px) scale(1)}
.cta-icon{font-size:1.1rem;transition:transform .3s}
.cta:hover .cta-icon{transform:translateX(4px)}
.cta-sub{font-size:.72rem;color:var(--muted);margin-top:1rem;opacity:.7;font-weight:300}

/* Bottom badge */
.badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(0,200,150,.07);border:1px solid rgba(0,200,150,.18);border-radius:20px;padding:.35rem .9rem;font-size:.72rem;color:var(--green);font-weight:500;letter-spacing:.04em;margin-top:2.5rem;animation:fadeUp .65s .55s both}
.bdot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.card{padding:3rem 1.5rem 2.5rem}.slogan{font-size:1.6rem}.cta{padding:.9rem 2rem}}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="particles" id="particles"></div>

<div class="card">

  <div class="logo-wrap">
    <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 2L4 10v8c0 8.3 5.9 16.1 14 18 8.1-1.9 14-9.7 14-18v-8L18 2z" fill="rgba(0,200,150,.15)" stroke="#00c896" stroke-width="1.5"/>
      <path d="M12 18l4 4 8-8" stroke="#00c896" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="logo-name">RentHedge</span>
  </div>

  <h1 class="slogan">
    <span class="line1">Tranquilidad para pagar,</span>
    <span class="line2">seguridad para arrendar.</span>
  </h1>

  <div class="sep"></div>

  <p class="sub">La red de protección financiera que el inquilino colombiano siempre mereció.</p>

  <div class="cta-wrap">
    <a href="app.html" class="cta">
      Bienvenido a tu segundo hogar
      <span class="cta-icon">→</span>
    </a>
    <p class="cta-sub">Descubre cómo RentHedge te protege</p>
  </div>

  <div class="badge"><span class="bdot"></span>Fintech · Bogotá · Colombia · 2026</div>

</div>

<script>
// Generate floating particles
const container = document.getElementById('particles');
for(let i = 0; i < 28; i++) {
  const p = document.createElement('div');
  p.className = 'p';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (6 + Math.random() * 10) + 's';
  p.style.animationDelay = (Math.random() * 8) + 's';
  p.style.opacity = (0.2 + Math.random() * 0.5).toString();
  const size = (1 + Math.random() * 3);
  p.style.width = size + 'px';
  p.style.height = size + 'px';
  container.appendChild(p);
}
</script>
</body>
</html>
