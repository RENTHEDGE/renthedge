<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentHedge — Protección Financiera para Inquilinos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#070b1c;--surface:#0d1530;--surface2:#121d3e;--green:#00c896;--green2:#00e6ac;--gold:#f0c060;--red:#ff5a5a;--text:#dce6f5;--muted:#7a90b8;--border:rgba(0,200,150,.13);--glow:rgba(0,200,150,.22)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.65}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(7,11,28,.9);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:.65rem;text-decoration:none}
.nav-brand{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;background:linear-gradient(120deg,var(--green),#7fffdf);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:2rem}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.85rem;transition:color .2s}
.nav-links a:hover{color:var(--green)}
@media(max-width:640px){nav{padding:.8rem 1.2rem}.nav-links{display:none}}
.nav-dropdown{position:relative}
.nav-cta{background:var(--green);color:#06091a;border:none;padding:.48rem 1.1rem;border-radius:6px;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem}
.nav-cta:hover{background:var(--green2);box-shadow:0 0 24px var(--glow)}
.nav-cta svg{transition:transform .2s}
.nav-dropdown.open .nav-cta svg{transform:rotate(180deg)}
.dropdown-menu{display:none;position:absolute;top:calc(100% + .6rem);right:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:200px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.5);z-index:200}
.nav-dropdown.open .dropdown-menu{display:block}
.dropdown-menu a{display:flex;align-items:center;gap:.65rem;padding:.7rem 1rem;font-size:.84rem;color:var(--muted);text-decoration:none;transition:background .15s,color .15s;border-bottom:1px solid rgba(255,255,255,.04)}
.dropdown-menu a:last-child{border-bottom:none}
.dropdown-menu a:hover{background:rgba(0,200,150,.07);color:var(--green)}
.dropdown-menu a span.di{font-size:.65rem;background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.2);color:var(--green);padding:.1rem .4rem;border-radius:4px;font-weight:700;letter-spacing:.05em;white-space:nowrap}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8rem 1.5rem 8rem;text-align:center;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% 65%,rgba(0,200,150,.06) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 15% 30%,rgba(74,144,226,.04) 0%,transparent 65%),radial-gradient(ellipse 40% 35% at 85% 75%,rgba(240,192,96,.03) 0%,transparent 60%)}
.hero-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,200,150,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,150,.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 80%)}
.badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(0,200,150,.08);border:1px solid rgba(0,200,150,.2);border-radius:20px;padding:.38rem 1rem;font-size:.75rem;color:var(--green);font-weight:500;letter-spacing:.04em;margin-bottom:1.8rem;animation:fadeUp .6s ease both}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(2.6rem,8vw,5.2rem);font-weight:800;line-height:1.05;max-width:860px;letter-spacing:-.02em;animation:fadeUp .7s .08s ease both}
.hero h1 em{font-style:normal;color:var(--muted)}
.accent{background:linear-gradient(125deg,var(--green) 10%,#7fffdf 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{max-width:580px;font-size:1.05rem;color:var(--muted);margin:1.6rem auto 0;line-height:1.75;font-weight:300;animation:fadeUp .7s .18s ease both}
.hero-actions{display:flex;flex-wrap:wrap;gap:.9rem;justify-content:center;margin-top:2.6rem;animation:fadeUp .7s .28s ease both}
.btn-p{background:var(--green);color:#06091a;border:none;padding:.78rem 1.8rem;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-p:hover{background:var(--green2);transform:translateY(-2px);box-shadow:0 8px 32px var(--glow)}
.btn-g{background:transparent;color:var(--text);border:1px solid rgba(220,230,245,.15);padding:.78rem 1.8rem;border-radius:8px;font-family:'Syne',sans-serif;font-weight:600;font-size:.92rem;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-g:hover{border-color:var(--green);color:var(--green)}
.hero-stats{display:flex;flex-wrap:wrap;justify-content:center;gap:0;margin-top:3.5rem;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:rgba(13,21,48,.6);backdrop-filter:blur(10px);animation:fadeUp .7s .36s ease both}
.hstat{padding:1.2rem 1.5rem;text-align:center;border-right:1px solid var(--border);transition:background .2s;min-width:120px}
.hstat:last-child{border-right:none}
.hstat:hover{background:rgba(0,200,150,.05)}
.hstat-val{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;color:var(--gold);display:block;line-height:1}
.hstat-label{font-size:.7rem;color:var(--muted);margin-top:.35rem;line-height:1.4}
.scroll-hint{position:absolute;bottom:2.2rem;left:50%;transform:translateX(-50%);color:var(--muted);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:.4rem;animation:fadeIn 1s 1s both;background:none;border:none;cursor:pointer;transition:color .2s;padding:.5rem 1rem}
.scroll-hint:hover{color:var(--green)}
.scroll-hint .arrow-down{width:24px;height:24px;border:1.5px solid currentColor;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:bounce 2s 1.5s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
section{padding:5.5rem 1.5rem;position:relative}
.container{max-width:1080px;margin:0 auto}
.eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--green);font-weight:600;margin-bottom:.75rem}
.sec-title{font-family:'Syne',sans-serif;font-size:clamp(1.9rem,5vw,2.9rem);font-weight:800;line-height:1.18;margin-bottom:1.1rem;letter-spacing:-.01em}
.sec-body{color:var(--muted);max-width:580px;font-size:.98rem;line-height:1.72}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .55s ease,transform .55s ease}
.reveal.vis{opacity:1;transform:translateY(0)}
.d1{transition-delay:.08s}.d2{transition-delay:.16s}.d3{transition-delay:.24s}.d4{transition-delay:.32s}
.pill{display:inline-block;background:rgba(0,200,150,.09);border:1px solid rgba(0,200,150,.2);color:var(--green);font-size:.71rem;padding:.22rem .65rem;border-radius:20px;font-weight:500;margin-top:.5rem}
.pill.gold{background:rgba(240,192,96,.09);border-color:rgba(240,192,96,.2);color:var(--gold)}
.ncard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.6rem;position:relative;overflow:hidden;transition:transform .25s,border-color .25s}
.ncard:hover{transform:translateY(-4px);border-color:rgba(255,90,90,.25)}
.ncard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),#ff8c5a)}
.ncard.gold-card::before{background:linear-gradient(90deg,var(--gold),#f0a060)}
.ncard-stat{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--red);margin-bottom:.5rem}
.ncard-stat.gold{color:var(--gold)}
.ncard h3{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:.4rem}
.ncard p{font-size:.84rem;color:var(--muted);line-height:1.6}
.ng{display:grid;grid-template-columns:1fr 1fr;gap:1.3rem;margin-top:2.5rem}
@media(max-width:640px){.ng{grid-template-columns:1fr}}
.insight{margin-top:2rem;background:linear-gradient(135deg,rgba(0,200,150,.07),rgba(0,200,150,.03));border:1px solid rgba(0,200,150,.2);border-radius:14px;padding:1.8rem 2rem;border-left:4px solid var(--green)}
.insight p{font-size:1.02rem;line-height:1.75;max-width:720px}
.insight strong{color:var(--text)}
.story{margin-top:2rem;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem;display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:center}
@media(max-width:640px){.story{grid-template-columns:1fr}}
.story-q{font-style:italic;font-size:1rem;line-height:1.8;color:var(--muted);border-left:3px solid var(--green);padding-left:1.2rem}
.story-q strong{color:var(--text);font-style:normal}
.story-r h3{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;margin-bottom:.8rem;color:var(--green)}
.story-r p{font-size:.87rem;color:var(--muted);line-height:1.7}
.tl{display:flex;overflow-x:auto;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:2rem}
.tl::-webkit-scrollbar{display:none}
.tlc{flex:1;min-width:110px;padding:1rem .8rem;text-align:center;border-right:1px solid var(--border);background:var(--surface);transition:background .2s}
.tlc:last-child{border-right:none}
.tlc:hover,.tlc.on{background:rgba(0,200,150,.07)}
.tlp{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.tle{font-size:.75rem;font-weight:600;margin-top:.3rem;color:var(--text);line-height:1.3}
.tld{width:7px;height:7px;border-radius:50%;margin:.5rem auto 0}
.tld.g{background:var(--green)}.tld.go{background:var(--gold)}.tld.r{background:var(--red)}
.steps{display:flex;flex-direction:column;gap:0;margin-top:2.5rem;position:relative}
.steps::before{content:'';position:absolute;left:27px;top:52px;bottom:52px;width:2px;background:linear-gradient(to bottom,var(--green),rgba(0,200,150,.05))}
.step{display:flex;gap:1.4rem;align-items:flex-start;padding:1.3rem 0;opacity:0;transform:translateX(-16px);transition:all .45s}
.step.vis{opacity:1;transform:translateX(0)}
.snum{min-width:54px;height:54px;border-radius:50%;background:var(--surface2);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:var(--green);font-size:1rem;flex-shrink:0;position:relative;z-index:1}
.sbody h3{font-family:'Syne',sans-serif;font-weight:700;font-size:.98rem;margin-bottom:.3rem}
.sbody p{font-size:.86rem;color:var(--muted);line-height:1.65}
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:2.5rem}
.met{background:var(--surface);padding:1.4rem 1rem;text-align:center;transition:background .2s}
.met:hover{background:var(--surface2)}
.met-val{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;color:var(--gold);display:block}
.met-label{font-size:.73rem;color:var(--muted);margin-top:.25rem;line-height:1.4}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.3rem;margin-top:2rem}
@media(max-width:680px){.charts-grid{grid-template-columns:1fr}}
.cchart{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.4rem}
.cchart h3{font-size:.76rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.cw{position:relative;height:210px}
.cnote{margin-top:1.5rem;background:var(--surface);border:1px solid rgba(240,192,96,.2);border-radius:12px;padding:1.4rem;display:grid;grid-template-columns:auto 1fr;gap:1rem;align-items:start}
.cnote-icon{font-size:1.3rem;margin-top:.1rem}
.cnote-label{font-size:.7rem;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.4rem}
.cnote-text{font-size:.83rem;color:var(--muted);line-height:1.65}
.cnote-text strong{color:var(--text)}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:14px;background:var(--surface);margin-top:2rem}
.ctable{width:100%;border-collapse:collapse;font-size:.85rem;min-width:580px}
.ctable thead tr{background:rgba(0,200,150,.05)}
.ctable th{font-family:'Syne',sans-serif;font-size:.73rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:.9rem 1rem;border-bottom:1px solid var(--border);text-align:left;color:var(--muted)}
.ctable th.g{color:var(--green)}
.ctable td{padding:.82rem 1rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top;color:var(--muted);line-height:1.45}
.ctable tr:last-child td{border-bottom:none}
.ctable tr:hover td{background:rgba(0,200,150,.025)}
.fc{color:var(--text);font-weight:500}
.gc{color:var(--green)!important;font-weight:500}
.yes{color:var(--green)}.no{color:var(--red)}
.market-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1.1rem;margin-top:2.5rem}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;transition:all .25s}
.mcard:hover{border-color:rgba(0,200,150,.35);transform:translateY(-4px)}
.mcard-val{font-family:'Syne',sans-serif;font-size:2.1rem;font-weight:800;color:var(--green);display:block;line-height:1.1;margin-bottom:.4rem}
.mcard-label{font-size:.83rem;color:var(--muted);line-height:1.55}
.mcard-source{font-size:.68rem;color:rgba(122,144,184,.38);margin-top:.6rem}
.reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-top:2rem}
@media(max-width:580px){.reg-grid{grid-template-columns:1fr}}
.reg-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem}
.reg-card.f1{border-top:3px solid var(--green)}.reg-card.f2{border-top:3px solid var(--gold)}
.rct{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:1rem}
.ri-item{display:flex;gap:.55rem;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.82rem;color:var(--muted);align-items:flex-start}
.ri-item:last-child{border-bottom:none}
.ri{color:var(--green);flex-shrink:0;margin-top:.15rem;font-size:.75rem}
.aml{margin-top:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.4rem}
.aml-title{font-size:.7rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.15em;margin-bottom:.9rem}
.aml-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.7rem}
.aml-item{font-size:.82rem;color:var(--muted);display:flex;gap:.5rem;align-items:flex-start}
.risk-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-top:2rem}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem;transition:border-color .2s}
.rcard:hover{border-color:rgba(122,144,184,.3)}
.rl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;padding:.2rem .55rem;border-radius:4px;display:inline-block;margin-bottom:.7rem}
.rl-high{background:rgba(255,90,90,.12);color:var(--red)}.rl-med{background:rgba(240,192,96,.12);color:var(--gold)}.rl-low{background:rgba(0,200,150,.1);color:var(--green)}
.rcard h4{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;margin-bottom:.35rem}
.rcard p{font-size:.81rem;color:var(--muted);line-height:1.55}
.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.2rem;margin-top:2.5rem}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.7rem 1.4rem;text-align:center;transition:all .25s;position:relative;overflow:hidden}
.tcard:hover{border-color:rgba(0,200,150,.3);transform:translateY(-4px)}
.tcard::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(0,200,150,.05) 0%,transparent 70%);pointer-events:none}
.tavatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--surface2),var(--surface));border:2px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--green)}
.tname{font-family:'Syne',sans-serif;font-weight:700;font-size:.93rem;margin-bottom:.22rem}
.trole{font-size:.77rem;color:var(--green);font-weight:500;margin-bottom:.6rem}
.tli{display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;color:var(--muted);text-decoration:none;background:rgba(122,144,184,.08);padding:.25rem .7rem;border-radius:20px;border:1px solid rgba(122,144,184,.15);transition:all .2s}
.tli:hover{color:var(--green);border-color:rgba(0,200,150,.3)}
.contact-section{padding:5.5rem 1.5rem;background:var(--bg);border-top:1px solid var(--border)}
.contact-wrap{max-width:620px;margin:0 auto}
.contact-form{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.4rem;margin-top:2rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:560px){.form-row{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1rem}
.form-group label{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.form-group input,.form-group textarea,.form-group select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);transition:border-color .2s,box-shadow .2s;outline:none}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,200,150,.1)}
.form-group textarea{resize:vertical;min-height:100px}
.form-group select option{background:var(--surface2)}
.form-submit{width:100%;background:var(--green);color:#06091a;border:none;padding:.85rem;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .2s;margin-top:.5rem}
.form-submit:hover{background:var(--green2);box-shadow:0 8px 32px var(--glow);transform:translateY(-2px)}
.form-note{font-size:.72rem;color:var(--muted);text-align:center;margin-top:.9rem;line-height:1.5}
.form-success{display:none;text-align:center;padding:2rem;background:rgba(0,200,150,.07);border:1px solid rgba(0,200,150,.2);border-radius:12px}
.form-success h3{font-family:'Syne',sans-serif;font-weight:700;color:var(--green);margin-bottom:.5rem}
.form-success p{font-size:.88rem;color:var(--muted)}
footer{padding:2rem;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:1rem;align-items:center;justify-content:space-between;font-size:.77rem;color:var(--muted)}
.fl{display:flex;align-items:center;gap:.6rem}

/* ── MODAL DE BIENVENIDA ── */
#welcomeModal{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:rgba(4,7,18,.92);backdrop-filter:blur(14px);animation:fadeIn .5s ease both}
#welcomeModal.hidden{display:none}
.wm-box{background:var(--surface);border:1px solid rgba(0,200,150,.25);border-radius:20px;max-width:640px;width:100%;padding:3rem 2.5rem;text-align:center;position:relative;box-shadow:0 32px 80px rgba(0,0,0,.6),0 0 60px rgba(0,200,150,.06);animation:fadeUp .6s .1s ease both}
.wm-logo{display:flex;align-items:center;justify-content:center;gap:.65rem;margin-bottom:2rem}
.wm-brand{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;background:linear-gradient
