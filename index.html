<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentHedge — Bienvenido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070b1c;
  --green:#00c896;
  --green2:#00e6ac;
  --text:#dce6f5;
  --muted:#7a90b8;
  --glow:rgba(0,200,150,.28);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
}
.bg-layer{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 90% 70% at 50% 55%, rgba(0,200,150,.07) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 20% 20%, rgba(74,144,226,.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 35% at 80% 80%, rgba(0,200,150,.04) 0%, transparent 60%);
}
.grid-layer{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,200,150,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,200,150,.035) 1px,transparent 1px);
  background-size:70px 70px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 10%,transparent 80%);
  animation:gridFade 3s ease both;
}
@keyframes gridFade{from{opacity:0}to{opacity:1}}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.p{
  position:absolute;width:2px;height:2px;
  background:var(--green);border-radius:50%;opacity:0;
  animation:floatUp var(--d,8s) var(--delay,0s) infinite ease-in-out;
}
@keyframes floatUp{
  0%{opacity:0;transform:translateY(0) scale(1)}
  20%{opacity:.6}
  80%{opacity:.2}
  100%{opacity:0;transform:translateY(-120px) scale(.4)}
}
.center{
  position:relative;z-index:1;
  text-align:center;
  padding:2rem 1.5rem;
  max-width:720px;
}
.logo{
  display:flex;align-items:center;justify-content:center;
  gap:.7rem;margin-bottom:2.8rem;
  animation:fadeUp .6s .1s ease both;
  opacity:0;
}
.logo-brand{
  font-family:'Syne',sans-serif;
  font-size:1.3rem;font-weight:800;
  background:linear-gradient(120deg,var(--green),#7fffdf);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.tagline{
  font-family:'Syne',sans-serif;
  font-size:clamp(2rem,7vw,4.4rem);
  font-weight:800;
  line-height:1.1;
  letter-spacing:-.03em;
  margin-bottom:1.2rem;
  animation:fadeUp .7s .25s ease both;
  opacity:0;
}
.tagline .line2{
  background:linear-gradient(125deg,var(--green) 10%,#7fffdf 80%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  display:block;
}
.sub{
  font-size:1rem;
  color:var(--muted);
  line-height:1.75;
  max-width:460px;
  margin:0 auto 3rem;
  font-weight:300;
  animation:fadeUp .7s .35s ease both;
  opacity:0;
}
.enter-btn{
  display:inline-flex;
  align-items:center;
  gap:.7rem;
  background:var(--green);
  color:#06091a;
  border:none;
  padding:1rem 2.2rem;
  border-radius:50px;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:1.05rem;
  cursor:pointer;
  text-decoration:none;
  transition:all .25s;
  animation:fadeUp .7s .45s ease both;
  opacity:0;
  position:relative;
  overflow:hidden;
}
.enter-btn::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.18) 50%,transparent 70%);
  transform:translateX(-100%);
  transition:transform .5s;
}
.enter-btn:hover::before{transform:translateX(100%)}
.enter-btn:hover{
  background:var(--green2);
  box-shadow:0 0 48px var(--glow),0 12px 40px rgba(0,200,150,.3);
  transform:translateY(-3px) scale(1.03);
}
.enter-btn:hover svg{transform:translateX(4px)}
.enter-btn svg{transition:transform .25s}
.bottom-badge{
  position:fixed;
  bottom:2rem;left:50%;
  transform:translateX(-50%);
  display:flex;align-items:center;gap:.5rem;
  font-size:.72rem;
  color:rgba(122,144,184,.45);
  animation:fadeUp .7s .7s ease both;
  opacity:0;
  white-space:nowrap;
}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
body.leaving .center{animation:fadeOut .5s ease forwards}
@keyframes fadeOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-20px)}}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="grid-layer"></div>
<div class="particles" id="particles"></div>

<div class="center">
  <div class="logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <path d="M18 2L4 10v8c0 8.3 5.9 16.1 14 18 8.1-1.9 14-9.7 14-18v-8L18 2z" fill="rgba(0,200,150,.12)" stroke="#00c896" stroke-width="1.5"/>
      <path d="M12 18l4 4 8-8" stroke="#00c896" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="logo-brand">RentHedge</span>
  </div>

  <h1 class="tagline">
    Tranquilidad para pagar,
    <span class="line2">seguridad para arrendar.</span>
  </h1>

  <p class="sub">La red de protección financiera que cuida al inquilino cuando más lo necesita. Bogotá, Colombia · 2026.</p>

  <a href="welcome.html" class="enter-btn" onclick="enterSite(event)">
    Bienvenido a tu segundo hogar
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#06091a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  </a>
</div>

<div class="bottom-badge">
  <span class="dot"></span>
  Fintech · Bogotá · Colombia · 2026
</div>

<script>
const container = document.getElementById('particles');
for(let i=0;i<28;i++){
  const p=document.createElement('div');
  p.className='p';
  p.style.left=Math.random()*100+'%';
  p.style.top=(40+Math.random()*50)+'%';
  p.style.setProperty('--d',(6+Math.random()*10)+'s');
  p.style.setProperty('--delay',(Math.random()*8)+'s');
  p.style.width=p.style.height=(1+Math.random()*2.5)+'px';
  container.appendChild(p);
}
function enterSite(e){
  e.preventDefault();
  document.body.classList.add('leaving');
  setTimeout(()=>{ window.location.href='welcome.html'; }, 480);
}
</script>
</body>
</html>
